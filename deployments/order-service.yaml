apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service

spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: nginx:latest
          ports:
            - containerPort: 80

          env:
            - name: SERVICE_NAME
              value: "order-service"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
